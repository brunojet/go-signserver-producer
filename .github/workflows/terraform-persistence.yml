name: Terraform Deploy - Persistence

on:
  push:
    branches:
      - develop
    paths:
      - 'infra/persistence/**'
      - '.github/workflows/terraform-persistence.yml'
  pull_request:
    branches:
      - develop
    paths:
      - 'infra/persistence/**'
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: aws-brunojet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Altere para sua regiĂŁo se necessĂˇrio

      - name: Install dos2unix
        run: sudo apt-get update && sudo apt-get install -y dos2unix

      - name: Terraform Init
        working-directory: infra/persistence
        run: terraform init

      - name: Load environment variables from .env file based on branch
        working-directory: infra/persistence
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH_NAME="$GITHUB_BASE_REF"
          else
            echo "Precisa ser um pull request para carregar as variĂˇveis de ambiente."
            exit 1
          fi
          ENV_FILE="${BRANCH_NAME}.env"
          if [ -f "$ENV_FILE" ]; then
            echo "Carregando variĂˇveis de ambiente do arquivo $ENV_FILE"
            dos2unix $ENV_FILE
            set -a
            source "$ENV_FILE"
            set +a
            echo "Carregando environment=$ENVIRONMENT"
            echo "Carregando project=$PROJECT"
            terraform plan -var="environment=$ENVIRONMENT" -var="project=$PROJECT"
          else
            echo "Arquivo $ENV_FILE nĂŁo encontrado. Falhando o workflow."
            exit 2
          fi
        shell: bash

